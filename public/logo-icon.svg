<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e40af" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Sun -->
  <g transform="translate(200, 120)">
    <circle cx="0" cy="-40" r="90" fill="url(#sunGrad)" filter="url(#glow)" opacity="0.9" />
    <!-- Sun rays -->
    <path d="M 0 -160 L 0 -180 M 85 -125 L 100 -140 M 120 -40 L 140 -40 M 85 45 L 100 60 M -85 -125 L -100 -140 M -120 -40 L -140 -40 M -85 45 L -100 60" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.5" />
  </g>

  <!-- Solar Panel -->
  <g transform="translate(50, 100)">
    <!-- Base shadow -->
    <path d="M 30 160 L 110 20 L 350 20 L 270 160 Z" fill="#000000" opacity="0.5" transform="translate(10, 10)" />
    
    <!-- Panel body -->
    <path d="M 30 160 L 110 20 L 350 20 L 270 160 Z" fill="url(#panelGrad)" stroke="#ffffff" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Horizontal Grid lines -->
    <line x1="70" y1="90" x2="310" y2="90" stroke="#ffffff" stroke-width="4" opacity="0.8" />
    <line x1="50" y1="125" x2="290" y2="125" stroke="#ffffff" stroke-width="4" opacity="0.8" />
    <line x1="90" y1="55" x2="330" y2="55" stroke="#ffffff" stroke-width="4" opacity="0.8" />
    
    <!-- Vertical Grid lines -->
    <line x1="170" y1="20" x2="90" y2="160" stroke="#ffffff" stroke-width="4" opacity="0.8" />
    <line x1="230" y1="20" x2="150" y2="160" stroke="#ffffff" stroke-width="4" opacity="0.8" />
    <line x1="290" y1="20" x2="210" y2="160" stroke="#ffffff" stroke-width="4" opacity="0.8" />
  </g>
</svg>
